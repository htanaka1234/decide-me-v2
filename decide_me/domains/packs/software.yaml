  question_templates:
    architecture_choice: What architecture choice should guide this implementation?
    api_contract: What API contract should this feature expose or consume?
    auth_strategy: What authentication or authorization strategy should apply?
    data_model: What data model or schema should this implementation use?
    ux_flow: What user flow should this implementation support?
    deployment_strategy: How should this change be deployed and operated?
    compliance_requirement: What compliance or privacy requirement constrains this work?
    verification_strategy: How should this software decision be verified?

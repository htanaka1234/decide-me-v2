    required_insufficient_evidence_ids: []
    forbidden_rule_ids: []
    forbidden_approval_thresholds:
      - human_review
      - external_review
  expected_conflicts:
    count: 0
  expected_revisit_quality:
    mode: exact
    count: 1
  expected_documents:
